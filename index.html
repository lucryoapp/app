<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCRYO - Gestão de Vendas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #00b894; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px;}
        button:hover { background-color: #00947a; }
        .btn-outline { background-color: transparent; color: #00b894; border: 2px solid #00b894; }
        .btn-outline:hover { background-color: #00b894; color: white; }
        .hidden { display: none; }
        .plan-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; margin-top: 10px; background: #dfe6e9; }
    </style>
</head>
<body>

    <div class="container" id="login-container">
        <h2 style="color: #2d3436;">Lucryo</h2>
        <p style="color: #636e72; font-size: 0.9rem; margin-bottom: 20px;">Acesse ou crie sua conta.</p>
        
        <input type="email" id="email" placeholder="Seu e-mail (O mesmo da compra)">
        <input type="password" id="password" placeholder="Sua senha">
        
        <button onclick="login()">Entrar</button>
        <button onclick="cadastrar()" class="btn-outline">Criar Conta</button>
    </div>

    <div class="container hidden" id="app-container">
        <h2>Painel Lucryo</h2>
        <div id="user-info"></div>
        <div id="plan-status" class="plan-badge"></div>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
        <div id="content-basico" class="hidden">
            <p>Você está no plano <strong>Básico</strong>.</p>
            <button onclick="window.location.href='https://pay.kiwify.com.br/3BdzfK1'">Fazer Upgrade para PRO</button>
        </div>

        <div id="content-premium" class="hidden">
            <p>🌟 Acesso <strong>Premium</strong> liberado!</p>
            <button>Abrir Gestão de Pedidos</button>
            <button style="margin-top: 10px; background-color: #0984e3;">Emitir Recibo VIP</button>
        </div>

        <button onclick="logout()" style="margin-top: 20px; background-color: #d63031;">Sair da Conta</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://iazehdwsnmunglhdtize.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_rPoTbDXSDr-zHPsgbEqY9Q_vDJklNAG';
        
        // CORREÇÃO AQUI: Mudamos o nome da variável para 'db' para não dar conflito
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function cadastrar() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!email || !password) {
                alert("Preencha e-mail e senha para criar a conta!");
                return;
            }

            const { data, error } = await db.auth.signUp({ email, password });

            if (error) {
                alert("Erro ao criar conta: " + error.message);
            } else {
                alert("Conta criada com sucesso! Agora você vai entrar no sistema.");
                checkUserPlan(data.user);
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await db.auth.signInWithPassword({ email, password });

            if (error) {
                alert("Erro: E-mail ou senha incorretos.");
            } else {
                checkUserPlan(data.user);
            }
        }

        async function checkUserPlan(user) {
            if(!user) return;

            const { data: perfil, error } = await db
                .from('perfis')
                .select('plano')
                .eq('email', user.email)
                .single();

            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('user-info').innerText = user.email;
            
            const planBadge = document.getElementById('plan-status');
            planBadge.innerText = "Plano: " + (perfil?.plano || 'basico').toUpperCase();

            if (perfil?.plano === 'premium' || perfil?.plano === 'pro') {
                document.getElementById('content-premium').classList.remove('hidden');
                document.getElementById('content-basico').classList.add('hidden');
            } else {
                document.getElementById('content-basico').classList.remove('hidden');
            }
        }

        async function logout() {
            await db.auth.signOut();
            window.location.reload();
        }
    </script>
</body>
</html>
